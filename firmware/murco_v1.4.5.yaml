substitutions:
  # ENGLISH VERSION
  # --- Sensors ---
  txt_co2_name: "murCO CO2"
  txt_temp_name: "murCO Temperature"
  txt_humidity: "murCO Humidity"
  txt_days_watering: "Days Since Watering"
  txt_plant_thirsty: "Plant Hydrated"

  # --- Settings & Sliders ---
  txt_day_bright: "Day Brightness (%)"
  txt_night_bright: "Night Brightness (%)"
  txt_temp_alerts: "Temperature Alerts"
  txt_high_temp: "High Temp Limit"
  txt_low_temp: "Low Temp Limit"
  txt_water_interval: "Watering Interval (Days, 0=Off)"
  txt_temp_offset: "Temperature Correction °C (restart required)"
  txt_day_start: "Day Start (hour)"
  txt_night_start: "Night Start (hour)"
  txt_co2_sensitive: "CO2 Sensitive Colors (4 zones)"

  # --- Buttons & Actions ---
  txt_btn_calibrate: "Calibrate CO2 (outdoors only!)"
  txt_btn_reset_water: "Reset Watering"
  txt_btn_factory: "murCO Factory (WIfi) Reset"
  txt_led_status: "murCO LED Status"

  # --- Diagnostics ---
  txt_debug_freeram: "Free RAM (bytes)"
  txt_debug_looptime: "Loop Speed (ms)"
  txt_debug_uptime: "Uptime"
  txt_fw_version: "murCO Firmware"
  txt_esphome_version: "ESPHome Version"
  txt_core_temp: "murCO Core Temperature"
  txt_btn_restart: "Restart murCO"

  # --- Audio ---
  txt_media_player: "murCO Speaker"
  txt_audio_enabled: "Audio"
  txt_audio_volume: "Audio Volume (%)"

  murco_version: "1.4.5"

# =======================================================
# CORE CONFIG
# =======================================================
esphome:
  name: murcoplanter
  name_add_mac_suffix: true
  friendly_name: murCO Planter
  project:
    name: murco.planter
    version: "${murco_version}"
  platformio_options:
    board_upload.maximum_size: 8388608
    # Custom 8MB partition table — file included in this repo.
    # Adjust the path to where YOUR ESPHome config folder lives:
    board_build.partitions: /config/boards/partitions_murco_8mb.csv
    board_build.flash_size: "8MB"
    board_build.flash_mode: "qio"   
    
  on_boot:
    priority: -100
    then:
      - logger.log: "------------------------------------------"
      - logger.log: "   murCO Planter by murco.design          "
      - logger.log: "        Two Souls, One Device             "
      - logger.log: "------------------------------------------"
      - globals.set:
          id: is_booted
          value: 'true'
      - switch.turn_on: led_logic_switch
      - script.execute: apply_temp_offset
      - logger.log: "Boot sequence finished. Waiting for Time Sync."

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: arduino
    sdkconfig_options:
      CONFIG_ESP32S3_SPIRAM_SUPPORT: "n"
      CONFIG_ESPTOOLPY_FLASHSIZE_4MB: "n"
      CONFIG_ESPTOOLPY_FLASHSIZE_8MB: "y"
      CONFIG_ESPTOOLPY_FLASHSIZE: "8MB"
      CONFIG_ESPTOOLPY_FLASHMODE_DIO: "n"
      CONFIG_ESPTOOLPY_FLASHMODE_QIO: "y"
      CONFIG_ESPTOOLPY_FLASHMODE: "qio"

mdns:
  disabled: false

# =======================================================
# CONNECTIVITY
# =======================================================
logger:

api:
  reboot_timeout: 0s
  encryption:
    # Generate your own 32-byte key: https://esphome.io/components/api.html
    # (Home Assistant will ask for this key when adopting the device)
    key: "GENERATE_YOUR_OWN_KEY_HERE"

debug:

ota:
  - platform: esphome

wifi:
  ap:
    ssid: "murCO Planter Setup"
  # Optional: Static IP (uncomment and configure if needed)
  # manual_ip:
  #   static_ip: 192.168.1.XXX
  #   gateway: 192.168.1.1
  #   subnet: 255.255.255.0
  #   dns1: 192.168.1.1

  on_disconnect:
    then:
      - script.execute: check_time_and_update_brightness
      - delay: 200ms
      - while:
          condition:
            not:
              wifi.connected:
          then:
            - light.turn_on:
                id: atom_led
                red: 100%
                green: 0%
                blue: 100%
                brightness: !lambda 'return id(current_brightness);'
            - delay: 500ms
            - light.turn_off: atom_led
            - delay: 500ms
  on_connect:
    then:
      - logger.log: "WiFi reconnected - restoring LED"
      - light.turn_on:
          id: atom_led
          effect: "None"
      - delay: 100ms
      - script.execute: update_led_logic


captive_portal:

web_server:
  port: 80
  version: 3

# --- BLE PROXY ---
bluetooth_proxy:
  active: true

# =======================================================
# TIME
# =======================================================
time:
  - platform: sntp
    id: sntp_time
    timezone: "CET-1CEST,M3.5.0,M10.5.0/3"
    on_time_sync:
      then:
        - script.execute: check_time_and_update_brightness
        - if:
            condition:
              lambda: 'return id(last_watered_timestamp) == 0;'
            then:
              - lambda: 'id(last_watered_timestamp) = id(sntp_time).now().timestamp;'
        - component.update: days_since_watering_sensor       
    on_time:
      # Check day/night mode every minute
      - seconds: 0
        minutes: /1
        then:
          - script.execute: check_time_and_update_brightness

# =======================================================
# HARDWARE
# =======================================================
# PIN: I2C bus for the SCD40 (Grove connector on the AtomS3 Lite)
i2c:
  sda: 1
  scl: 2
  scan: true

# PIN: I2S audio bus for the MAX98357A amplifier (optional — TTS speaker)
i2s_audio:
  i2s_lrclk_pin: 6
  i2s_bclk_pin: 5

# =======================================================
# STORAGE & VARIABLES
# =======================================================
globals:
  - id: is_booted
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: led_active
    type: bool
    restore_value: yes
    initial_value: 'true'

  - id: last_watered_timestamp
    type: time_t
    restore_value: yes
    initial_value: '0'

  - id: current_brightness
    type: float
    restore_value: yes
    initial_value: '0.4'

  - id: r_val
    type: float
    initial_value: '0.0'

  - id: g_val
    type: float
    initial_value: '1.0'

  - id: ip_hundreds
    type: int
    initial_value: '0'

  - id: ip_tens
    type: int
    initial_value: '0'

  - id: ip_units
    type: int
    initial_value: '0'

  - id: ip_blink_counter
    type: int
    initial_value: '0'

# =======================================================
# HARDWARE: LIGHT
# =======================================================
light:
  # PIN: onboard WS2812 RGB LED of the AtomS3 Lite (GPIO 35)
  - platform: esp32_rmt_led_strip
    pin: 35
    num_leds: 1
    rgb_order: GRB
    chipset: WS2812
    id: atom_led
    default_transition_length: 0s
    effects:
      - pulse:
          name: "Thirsty Pulse"
          transition_length: 500ms
          update_interval: 500ms
   
# =======================================================
# AUDIO
# =======================================================
# Shows up in Home Assistant as a media_player entity —
# any HA automation can speak through murCO (TTS, doorbell, alerts...)
media_player:
  - platform: i2s_audio
    name: "${txt_media_player}"
    id: murco_speaker
    dac_type: external   # MAX98357A is an external DAC
    i2s_dout_pin: 7      # PIN: data line to the amplifier
    mode: mono

# =======================================================
# USER CONTROLS (UI)
# =======================================================
number:
  - platform: template
    name: "${txt_water_interval}"
    id: watering_threshold
    min_value: 0
    max_value: 14
    step: 1
    initial_value: 2
    optimistic: true
    restore_value: true
    icon: "mdi:water-sync"
    entity_category: config

  - platform: template
    name: "${txt_day_bright}"
    id: day_brightness_ui
    min_value: 40
    max_value: 95
    step: 1
    initial_value: 70
    restore_value: yes
    optimistic: yes
    icon: "mdi:brightness-7"
    entity_category: config
    on_value:
      then:
        - script.execute: check_time_and_update_brightness

  - platform: template
    name: "${txt_night_bright}"
    id: night_brightness_ui
    min_value: 23
    max_value: 80
    step: 1
    initial_value: 23
    restore_value: yes
    optimistic: yes
    icon: "mdi:brightness-3"
    entity_category: config
    on_value:
      then:
        - script.execute: check_time_and_update_brightness

  - platform: template
    name: "${txt_low_temp}"
    id: temp_low_limit
    icon: "mdi:thermometer-minus"
    min_value: 10
    max_value: 19
    step: 1
    initial_value: 17
    restore_value: true
    optimistic: true
    entity_category: config

  - platform: template
    name: "${txt_high_temp}"
    id: temp_high_limit
    icon: "mdi:thermometer-plus"
    min_value: 19
    max_value: 45
    step: 1
    initial_value: 26
    restore_value: true
    optimistic: true
    entity_category: config

  - platform: template
    name: "${txt_temp_offset}"
    id: temp_offset
    min_value: 0.0
    max_value: 10.0
    step: 0.5
    initial_value: 6.0
    restore_value: yes
    optimistic: yes
    icon: "mdi:thermometer-check"
    entity_category: config
    on_value:
      then:
        - script.execute: apply_temp_offset

  # --- Day/Night Schedule ---
  - platform: template
    name: "${txt_day_start}"
    id: day_start_hour
    min_value: 4
    max_value: 12
    step: 1
    initial_value: 7
    restore_value: yes
    optimistic: yes
    icon: "mdi:weather-sunny"
    entity_category: config

  - platform: template
    name: "${txt_night_start}"
    id: night_start_hour
    min_value: 18
    max_value: 23
    step: 1
    initial_value: 22
    restore_value: yes
    optimistic: yes
    icon: "mdi:weather-night"
    entity_category: config       

  # --- Announcement volume ---
  - platform: template
    name: "${txt_audio_volume}"
    id: audio_volume
    min_value: 10
    max_value: 95
    step: 5
    initial_value: 70
    restore_value: yes
    optimistic: yes
    icon: "mdi:volume-high"
    entity_category: config
    on_value:
      then:
        - media_player.volume_set:
            id: murco_speaker
            volume: !lambda 'return x / 100.0f;'

# =======================================================
# SWITCH
# =======================================================   
switch:
  - platform: template
    name: "${txt_led_status}"
    id: led_logic_switch
    icon: "mdi:led-on"
    lambda: |-
      return id(led_active);
    turn_on_action:
      - globals.set: {id: led_active, value: 'true'}
      - switch.template.publish: {id: led_logic_switch, state: true}
      - script.execute: update_led_logic
      - logger.log: "LED Logic enabled"
    turn_off_action:
      - globals.set: {id: led_active, value: 'false'}
      - switch.template.publish: {id: led_logic_switch, state: false}
      - script.stop: update_led_logic
      - light.turn_off: atom_led
      - logger.log: "LED Logic disabled"

  - platform: template
    name: "${txt_temp_alerts}"
    id: temp_alerts_enabled
    icon: "mdi:thermometer-alert"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config

  # --- Enable/disable voice announcements ---
  - platform: template
    name: "${txt_audio_enabled}"
    id: audio_enabled
    icon: "mdi:volume-source"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF   # default off until customer has a speaker installed
    entity_category: config

  # --- CO2 Sensitive Mode (4 color zones) ---
  - platform: template
    name: "${txt_co2_sensitive}"
    id: co2_sensitive_mode
    icon: "mdi:chart-bell-curve"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
   
# =======================================================
# BUTTON
# =======================================================

button:
  - platform: template
    name: "${txt_btn_reset_water}"
    icon: "mdi:water-check"
    on_press:
      - lambda: |-
          auto time = id(sntp_time).now();
          if (time.is_valid()) {
            id(last_watered_timestamp) = time.timestamp;
          }
      - component.update: days_since_watering_sensor
      - script.stop: update_led_logic
      - repeat:
          count: 3
          then:
            - light.turn_on:
                id: atom_led
                red: 0.5
                green: 0.0
                blue: 1.0
                brightness: !lambda 'return id(current_brightness);'
            - delay: 200ms
            - light.turn_off: atom_led
            - delay: 150ms
      - delay: 200ms
      - script.execute: update_led_logic

  - platform: template
    name: "${txt_btn_calibrate}"
    id: calibrate_co2
    icon: "mdi:refresh"
    entity_category: config
    on_press:
      then:
        - logger.log: "Starting Forced Recalibration to 400ppm..."
        - lambda: 'id(scd_sensor).perform_forced_calibration(400);'
        - logger.log: "Calibration finished!"

  - platform: factory_reset
    id: factory_reset_button
    name: "${txt_btn_factory}"
    entity_category: config

  # --- Restart murCO ---
  - platform: restart
    name: "${txt_btn_restart}"
    icon: "mdi:restart"
    entity_category: diagnostic
           
# =======================================================
# SENSORS
# =======================================================
sensor:
  # Sensirion SCD40 — true NDIR CO2 + temperature + humidity.
  # temperature_offset compensates self-heating inside the enclosure
  # (typically 3–6 °C above ambient). Also adjustable at runtime via
  # the web UI slider — a new offset fully applies after a restart.
  - platform: scd4x
    id: scd_sensor
    update_interval: 60s
    automatic_self_calibration: true
    temperature_offset: 6.0  
    temperature:
      name: "${txt_temp_name}"
      id: murco_temp
    humidity:
      name: "${txt_humidity}"
      id: murco_humidity
    co2:
      name: "${txt_co2_name}"
      id: murco_co2
      on_value:
        then:
          # CO2 → LED color mapping (ASHRAE/REHVA-based thresholds).
          # Want different zones? Change the ppm values below.
          - lambda: |-
              if (id(co2_sensitive_mode).state) {
                // Sensitive mode (4 zones)
                if (x < 700)        { id(r_val)=0.0; id(g_val)=1.0; }  // Green
                else if (x < 1100)  { id(r_val)=1.0; id(g_val)=0.95; }  // Yellow
                else if (x < 1600)  { id(r_val)=1.0; id(g_val)=0.75; }  // Orange
                else                { id(r_val)=1.0; id(g_val)=0.0; }  // Red
              } else {
                // Standard mode (3 zones)
                if (x < 1000)       { id(r_val)=0.0; id(g_val)=1.0; }  // Green
                else if (x < 1500)  { id(r_val)=1.0; id(g_val)=0.75; }  // Orange
                else                { id(r_val)=1.0; id(g_val)=0.0; }  // Red
              }
          - script.execute: update_led_logic

  - platform: template
    name: "${txt_days_watering}"
    id: days_since_watering_sensor
    unit_of_measurement: "days"
    accuracy_decimals: 1
    icon: "mdi:calendar-clock"
    update_interval: 30min
    lambda: |-
      if (id(last_watered_timestamp) == 0) return 0.0;
      auto current_time = id(sntp_time).now();
      if (!current_time.is_valid()) return 0.0;
      float diff = current_time.timestamp - id(last_watered_timestamp);
      return diff / 86400.0;

  # Core temperature safety monitor
  - platform: internal_temperature
    name: "${txt_core_temp}"
    id: core_temp
    entity_category: diagnostic
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x > 85.0;'
            then:
              - logger.log: "WARNING: Core temp critical! Turning off LED."
              - light.turn_off: atom_led

  - platform: debug
    free:
      name: "${txt_debug_freeram}"
      entity_category: diagnostic
    loop_time:
      name: "${txt_debug_looptime}"
      entity_category: diagnostic

  - platform: uptime
    name: "${txt_debug_uptime}"
    entity_category: diagnostic

text_sensor:
  - platform: version
    name: "${txt_esphome_version}"
    entity_category: diagnostic
    hide_timestamp: true

  - platform: template
    name: "${txt_fw_version}"
    lambda: 'return {"${murco_version}"};'
    entity_category: diagnostic
    icon: "mdi:information-outline"

# =======================================================
# BINARY SENSORS & BUTTON
# =======================================================
binary_sensor:
  # PIN: onboard button of the AtomS3 Lite (GPIO 41).
  # One button, five functions: 1x = LED on/off, 2x = watering reset,
  # long press = climate report (+ HA event for TTS), 4x = blink IP, 6x = factory reset
  - platform: gpio
    pin:
      number: 41
      inverted: true
    id: murco_button
    # Feedback DURING hold - blinks white after 1.5s
    on_press:
      then:
        - delay: 1500ms
        - if:
            condition:
              binary_sensor.is_on: murco_button
            then:
              - light.turn_on:
                  id: atom_led
                  red: 1.0
                  green: 1.0
                  blue: 1.0
                  brightness: !lambda 'return id(current_brightness);'
              - delay: 200ms
              - light.turn_off: atom_led
              - delay: 100ms    
    on_multi_click:
      # --- 1. Single Click: Toggle LED On/Off ---
      - timing:
          - ON for 50ms to 1s
          - OFF for at least 0.5s
        then:
          - if:
              condition: [ lambda: 'return id(led_active);' ]
              then:
                - globals.set: {id: led_active, value: 'false'}
                - switch.template.publish: {id: led_logic_switch, state: false}
                - script.stop: update_led_logic
                - light.turn_off: atom_led
              else:
                - globals.set: {id: led_active, value: 'true'}
                - switch.template.publish: {id: led_logic_switch, state: true}
                - script.execute: update_led_logic

      # --- 2. Double Click: Physical Watering Reset ---
      - timing:
          - ON for 50ms to 350ms
          - OFF for 50ms to 350ms
          - ON for 50ms to 350ms
          - OFF for at least 0.5s
        then:
          - lambda: |-
              auto time = id(sntp_time).now();
              if (time.is_valid()) {
                id(last_watered_timestamp) = time.timestamp;
              }
          - component.update: days_since_watering_sensor
          - script.stop: update_led_logic
          - repeat:
              count: 3
              then:
                - light.turn_on:
                    id: atom_led
                    red: 0.5
                    green: 0.0
                    blue: 1.0
                    brightness: !lambda 'return id(current_brightness);'
                - delay: 200ms
                - light.turn_off: atom_led
                - delay: 150ms
          - delay: 100ms
          - script.execute: update_led_logic

      # --- 3. Long Press 1.5s-5s: Climate Flash Report + Audio ---
      - timing:
          - ON for 1.5s to 5s
          - OFF for at least 0.1s
        then:
          - script.stop: update_led_logic
          # Fires esphome.murco_climate_report in HA with co2/temp/humidity.
          # Pair it with a TTS automation for a spoken climate report —
          # example in murCO_HA_Automations.yml. Harmless if unused.
          - homeassistant.event:
              event: esphome.murco_climate_report
              data:
                co2: !lambda 'return to_string((int)id(murco_co2).state);'
                temp: !lambda 'return to_string(id(murco_temp).state);'
                humidity: !lambda 'return to_string((int)id(murco_humidity).state);'
          # LED temperature report (for all users)
          - lambda: |-
              auto call = id(atom_led).make_call();
              call.set_state(true);
              call.set_brightness(id(current_brightness));
              float t = id(murco_temp).state;
              float low = id(temp_low_limit).state;
              float high = id(temp_high_limit).state;
              if (t < low) call.set_rgb(0,0,1);
              else if (t > high) call.set_rgb(1, 0.95, 0);
              else call.set_rgb(1,1,1);
              call.perform();
          - delay: 7s
          - if:
              condition: [ lambda: 'return id(led_active);' ]
              then:
                - script.execute: update_led_logic
              else:
                - light.turn_off: atom_led

      # --- 4. Four Clicks: Display Last IP Octet ---
      - timing:
          - ON for 50ms to 350ms
          - OFF for 50ms to 350ms
          - ON for 50ms to 350ms
          - OFF for 50ms to 350ms
          - ON for 50ms to 350ms
          - OFF for 50ms to 350ms
          - ON for 50ms to 350ms
          - OFF for at least 0.3s
        then:
          - logger.log: "4x click - Displaying last IP octet"
          - script.stop: update_led_logic
          - script.execute: show_ip_octet

     # --- 5. Six Clicks: Factory Reset ---
      - timing:
          - ON for 50ms to 350ms
          - OFF for 50ms to 350ms
          - ON for 50ms to 350ms
          - OFF for 50ms to 350ms
          - ON for 50ms to 350ms
          - OFF for 50ms to 350ms
          - ON for 50ms to 350ms
          - OFF for 50ms to 350ms
          - ON for 50ms to 350ms
          - OFF for 50ms to 350ms
          - ON for 50ms to 350ms
          - OFF for at least 0.5s
        then:
          - logger.log: "Factory Reset triggered by 6x click"
          - script.stop: update_led_logic
          # Confirmation - 5x cyan blinks
          - repeat:
              count: 5
              then:
                - light.turn_on:
                    id: atom_led
                    red: 0.0
                    green: 1.0
                    blue: 1.0
                    brightness: 1.0
                - delay: 300ms
                - light.turn_off: atom_led
                - delay: 200ms
          - logger.log: "Erasing Flash & Resetting WiFi..."
          - button.press: factory_reset_button

  - platform: template
    name: "${txt_plant_thirsty}"
    id: murco_plant_thirsty
    device_class: moisture
    lambda: |-
      if (id(watering_threshold).state == 0) return true;
      return id(days_since_watering_sensor).state < id(watering_threshold).state;

# =======================================================
# SCRIPTS
# =======================================================
script:
  # -------------------------------------------------------
  # LED LOGIC (unchanged)
  # -------------------------------------------------------
  # The LED state machine: CO2 color → critical alert → watering pulse →
  # temperature blinks → back to CO2 color.
  # IMPORTANT: mode: restart is deliberate — overlapping triggers
  # (new CO2 reading during an alert etc.) restart the script instead of
  # stacking recursive runs. If you extend this script, keep it that way.
  - id: update_led_logic
    mode: restart
    then:
      - if:
          condition: [ lambda: 'return id(led_active);' ]
          then:
            # 1. Show primary CO2 color
            - light.turn_on:
                id: atom_led
                red: !lambda "return id(r_val);"
                green: !lambda "return id(g_val);"
                blue: 0%
                brightness: !lambda "return id(current_brightness);"
                effect: "None"

            # 1b. Critical CO2 alert
            - if:
                condition:
                  lambda: 'return id(murco_co2).state > 2500;'
                then:
                  - script.execute: check_time_and_update_brightness
                  - delay: 100ms
                  - while:
                      condition:
                        lambda: 'return id(murco_co2).state > 2500;'
                      then:
                        - light.turn_on:
                            id: atom_led
                            red: 1.0
                            green: 0.0
                            blue: 0.0
                            brightness: !lambda 'return id(current_brightness);'
                        - delay: 300ms
                        - light.turn_off: atom_led
                        - delay: 300ms
            # 2. Watering alert - day only
            - if:
                condition:
                  lambda: |-
                    auto time = id(sntp_time).now();
                    bool is_day = time.is_valid() && 
                                  time.hour >= (int)id(day_start_hour).state && 
                                  time.hour < (int)id(night_start_hour).state;
                    return is_day &&
                           id(watering_threshold).state > 0 &&
                           id(days_since_watering_sensor).state >= id(watering_threshold).state &&
                           id(days_since_watering_sensor).state > 0.1;
                then:
                  - delay: 2s
                  - light.turn_on:
                      id: atom_led
                      red: 0.0
                      green: 0.0
                      blue: 1.0
                      effect: "Thirsty Pulse"
                      brightness: !lambda "return id(current_brightness);"
                  - delay: 4s
                  - light.turn_on:
                      id: atom_led
                      effect: "None"

            # 3. Always restore CO2 color after watering check
            - light.turn_on:
                id: atom_led
                red: !lambda "return id(r_val);"
                green: !lambda "return id(g_val);"
                blue: 0%
                brightness: !lambda "return id(current_brightness);"
                effect: "None"

            # 4. Show CO2 color before temperature alarms
            - if:
                condition:
                  and:
                    - switch.is_on: temp_alerts_enabled
                    - or:
                        - lambda: 'return id(murco_temp).state < id(temp_low_limit).state;'
                        - lambda: 'return id(murco_temp).state > id(temp_high_limit).state;'
                then:
                  - delay: 2s
                  - light.turn_on:
                      id: atom_led
                      red: !lambda "return id(r_val);"
                      green: !lambda "return id(g_val);"
                      blue: 0%
                      brightness: !lambda "return id(current_brightness);"
                      effect: "None"
                  - delay: 3s

            # 5. Temperature Alarm - Cold (3x White)
            - if:
                condition:
                  and:
                    - switch.is_on: temp_alerts_enabled
                    - lambda: 'return id(murco_temp).state < id(temp_low_limit).state;'
                then:
                  - repeat:
                      count: 3
                      then:
                        - light.turn_on:
                            id: atom_led
                            red: 1.0
                            green: 1.0
                            blue: 1.0
                            brightness: !lambda 'return id(current_brightness);'
                        - delay: 0.5s
                        - light.turn_on:
                            id: atom_led
                            brightness: 0%
                        - delay: 0.5s

            # 6. Temperature Alarm - Hot (3x Yellow-Orange)
            - if:
                condition:
                  and:
                    - switch.is_on: temp_alerts_enabled
                    - lambda: 'return id(murco_temp).state > id(temp_high_limit).state;'
                then:
                  - repeat:
                      count: 3
                      then:
                        - light.turn_on:
                            id: atom_led
                            red: 1.0
                            green: 0.95
                            blue: 0.0
                            brightness: !lambda 'return id(current_brightness);'
                        - delay: 0.5s
                        - light.turn_on:
                            id: atom_led
                            brightness: 0%
                        - delay: 0.5s

            # 7. Return to CO2 color after all alarms
            - light.turn_on:
                id: atom_led
                red: !lambda "return id(r_val);"
                green: !lambda "return id(g_val);"
                blue: 0%
                brightness: !lambda "return id(current_brightness);"
                effect: "None"

  - id: check_time_and_update_brightness
    then:
      - if:
          condition:
            lambda: 'return id(is_booted);'
          then:
            - if:
                condition:
                  lambda: |-
                    auto time = id(sntp_time).now();
                    if (!time.is_valid()) return false;
                    int hour = time.hour;
                    int day_start = (int)id(day_start_hour).state;
                    int night_start = (int)id(night_start_hour).state;
                    return (hour >= day_start && hour < night_start);
                then:
                  - globals.set:
                      id: current_brightness
                      value: !lambda "return id(day_brightness_ui).state / 100.0;"
                  - logger.log: "Time Mode: Day"
                else:
                  - globals.set:
                      id: current_brightness
                      value: !lambda "return id(night_brightness_ui).state / 100.0;"
                  - logger.log: "Time Mode: Night"
            - if:
                condition:
                  lambda: 'return id(led_active);'
                then:
                  - light.turn_on:
                      id: atom_led
                      brightness: !lambda "return id(current_brightness);"
            - script.execute: update_led_logic

  # Applies temperature offset to SCD40 sensor
  # Note: SCD40 typically requires a restart to fully apply new offset.
  # This script writes the offset but the change becomes effective after next reboot.
  - id: apply_temp_offset
    mode: single
    then:
      - lambda: 'id(scd_sensor).set_temperature_offset(id(temp_offset).state);'
      - logger.log:
          format: "Temperature offset set to %.1f°C (restart device to apply)"
          args: ['id(temp_offset).state']
          
  # Displays last IP octet via LED blinks
  - id: show_ip_octet
    then:
      - lambda: |-
          auto ips = esphome::wifi::global_wifi_component->get_ip_addresses();
          std::string ip_str = ips[0].str();
          size_t last_dot = ip_str.rfind('.');
          uint8_t octet = std::stoi(ip_str.substr(last_dot + 1));
          id(ip_hundreds) = octet / 100;
          id(ip_tens) = (octet % 100) / 10;
          id(ip_units) = octet % 10;
          ESP_LOGI("IP", "Showing last octet: %d (%d-%d-%d)",
                   octet, id(ip_hundreds), id(ip_tens), id(ip_units));

      # Intro: 3x white blinks
      - repeat:
          count: 3
          then:
            - light.turn_on:
                id: atom_led
                red: 1.0
                green: 1.0
                blue: 1.0
                brightness: 1.0
            - delay: 150ms
            - light.turn_off: atom_led
            - delay: 150ms
      - delay: 700ms

      # Hundreds (Green)
      - if:
          condition:
            lambda: 'return id(ip_hundreds) == 0;'
          then:
            - light.turn_on:
                id: atom_led
                red: 0.0
                green: 1.0
                blue: 0.0
                brightness: 1.0
            - delay: 80ms
            - light.turn_off: atom_led
          else:
            - lambda: 'id(ip_blink_counter) = 0;'
            - while:
                condition:
                  lambda: 'return id(ip_blink_counter) < id(ip_hundreds);'
                then:
                  - light.turn_on:
                      id: atom_led
                      red: 0.0
                      green: 1.0
                      blue: 0.0
                      brightness: 1.0
                  - delay: 400ms
                  - light.turn_off: atom_led
                  - delay: 400ms
                  - lambda: 'id(ip_blink_counter)++;'
      - delay: 900ms

      # Tens (Orange)
      - if:
          condition:
            lambda: 'return id(ip_tens) == 0;'
          then:
            - light.turn_on:
                id: atom_led
                red: 1.0
                green: 0.5
                blue: 0.0
                brightness: 1.0
            - delay: 80ms
            - light.turn_off: atom_led
          else:
            - lambda: 'id(ip_blink_counter) = 0;'
            - while:
                condition:
                  lambda: 'return id(ip_blink_counter) < id(ip_tens);'
                then:
                  - light.turn_on:
                      id: atom_led
                      red: 1.0
                      green: 0.5
                      blue: 0.0
                      brightness: 1.0
                  - delay: 400ms
                  - light.turn_off: atom_led
                  - delay: 400ms
                  - lambda: 'id(ip_blink_counter)++;'
      - delay: 900ms

      # Units (Blue)
      - if:
          condition:
            lambda: 'return id(ip_units) == 0;'
          then:
            - light.turn_on:
                id: atom_led
                red: 0.0
                green: 0.0
                blue: 1.0
                brightness: 1.0
            - delay: 80ms
            - light.turn_off: atom_led
          else:
            - lambda: 'id(ip_blink_counter) = 0;'
            - while:
                condition:
                  lambda: 'return id(ip_blink_counter) < id(ip_units);'
                then:
                  - light.turn_on:
                      id: atom_led
                      red: 0.0
                      green: 0.0
                      blue: 1.0
                      brightness: 1.0
                  - delay: 400ms
                  - light.turn_off: atom_led
                  - delay: 400ms
                  - lambda: 'id(ip_blink_counter)++;'

      # Outro: 3x white blinks
      - delay: 600ms
      - repeat:
          count: 3
          then:
            - light.turn_on:
                id: atom_led
                red: 1.0
                green: 1.0
                blue: 1.0
                brightness: 1.0
            - delay: 150ms
            - light.turn_off: atom_led
            - delay: 150ms
      - delay: 400ms

      # Return to normal state
      - if:
          condition:
            lambda: 'return id(led_active);'
          then:
            - globals.set: {id: led_active, value: 'true'}
            - switch.template.publish: {id: led_logic_switch, state: true}
            - light.turn_on:
                id: atom_led
                red: !lambda "return id(r_val);"
                green: !lambda "return id(g_val);"
                blue: 0%
                brightness: !lambda "return id(current_brightness);"
                effect: "None"
            - delay: 200ms
            - script.execute: update_led_logic
          else:
            - light.turn_off: atom_led
